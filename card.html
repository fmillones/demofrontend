<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pago con tarjeta</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://static.payzen.lat/static/js/krypton-client/V4.0/ext/neon-reset.min.css">
  <script src="https://static.payzen.lat/static/js/krypton-client/V4.0/ext/neon.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <a class="back" href="./checkout.html" id="back-link">← Volver</a>
    <p class="eyebrow">PAYZEN · PAGO CON TARJETA</p>
    <h1>Pago con tarjeta</h1>
    <section class="pay-summary">
      <div class="pay-summary-row"><span>País</span><strong id="sum-country">—</strong></div>
      <div class="pay-summary-row"><span>Adquirente</span><strong id="sum-acquirer">—</strong></div>
      <div class="pay-summary-row"><span>Monto</span><strong id="sum-amount">—</strong></div>
      <div class="pay-summary-row" id="sum-dni-row" hidden><span>DNI</span><strong id="sum-dni">—</strong></div>
      <div class="pay-summary-row" id="sum-email-row" hidden><span>Correo</span><strong id="sum-email">—</strong></div>
    </section>
    <p id="status" role="status" aria-live="polite"></p>
    <section id="checkout"><div id="form-container"></div></section>
    <section id="result" class="result" hidden></section>
    <details open><summary>Lo que enviamos</summary><pre id="sent-log">Aún no se ha enviado nada.</pre></details>
    <details open><summary>Lo que recibimos</summary><pre id="received-log">Aún no se ha recibido nada.</pre></details>
    <details open><summary>IPN recibido (backend)</summary><pre id="ipn-log">Esperando notificación IPN de PayZen…</pre></details>
  </main>
  <script src="./config.js"></script>
  <script src="./card.js"></script>
</body></html>
