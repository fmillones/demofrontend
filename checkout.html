1: <!doctype html>
2: <html lang="es">
3: <head>
4:   <meta charset="utf-8">
5:   <meta name="viewport" content="width=device-width, initial-scale=1">
6:   <title>Checkout — Datos de pago</title>
7:   <link rel="icon" href="data:,">
8:   <link rel="stylesheet" href="./styles.css">
9: </head>
10: <body>
11:   <main>
12:     <a class="back" href="./index.html">← Cambiar país / adquirente</a>
13:     <p class="eyebrow" id="context-eyebrow">PAYZEN · PRUEBAS</p>
14:     <h1>Checkout</h1>
15:     <p class="lead" id="context-lead">Pago seguro.</p>
16:     <form id="payment-form">
17:       <label>Monto (<span id="currency-label">—</span>)
18:         <input name="amount" type="number" min="0.01" step="0.01" value="10.00" required>
19:       </label>
20:       <label>DNI <span>(opcional, 8 dígitos)</span>
21:         <input name="dni" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" placeholder="12345678">
22:       </label>
23:       <label>Correo <span>(opcional)</span><input name="email" type="email" placeholder="cliente@ejemplo.com"></label>
24:       <div class="method-select">
25:         <button type="submit" data-method="card" class="method-card">
26:           <span class="method-icon">💳</span>
27:           <span class="method-title">Pagar con tarjeta</span>
28:         </button>
29:         <button type="submit" data-method="qr" class="method-card">
30:           <span class="method-icon">📱</span>
31:           <span class="method-title">Pagar con billetera electrónica</span>
32:         </button>
33:       </div>
34:     </form>
35:     <p id="status" role="status" aria-live="polite"></p>
36:   </main>
37:   <script src="./config.js"></script>
38:   <script src="./checkout.js"></script>
39: </body></html>
