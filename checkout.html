<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — Datos de pago</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <a class="back" href="./index.html">← Cambiar país / adquirente</a>
    <p class="eyebrow" id="context-eyebrow">PAYZEN · PRUEBAS</p>
    <h1>Checkout</h1>
    <p class="lead" id="context-lead">Pago seguro.</p>
    <form id="payment-form">
      <label>Monto (<span id="currency-label">—</span>)
        <input name="amount" type="number" min="0.01" step="0.01" value="10.00" required>
      </label>
      <label>DNI <span>(opcional, 8 dígitos)</span>
        <input name="dni" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" placeholder="12345678">
      </label>
      <label>Correo <span>(opcional)</span><input name="email" type="email" placeholder="cliente@ejemplo.com"></label>
      <div class="method-select">
        <button type="submit" data-method="card" class="method-card">
          <span class="method-icon">💳</span>
          <span class="method-title">Pagar con tarjeta</span>
        </button>
        <button type="submit" data-method="qr" class="method-card">
          <span class="method-icon">📱</span>
          <span class="method-title">Pagar con billetera electrónica</span>
        </button>
      </div>
    </form>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script src="./config.js"></script>
  <script src="./checkout.js"></script>
</body></html>
